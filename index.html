<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Employee Referral</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background: #f5f5f5; margin:0; }
    .card { background: white; padding: 24px; border-radius: 8px; max-width: 600px; margin: auto; }
    h2 { margin-bottom: 20px; color: #333; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 14px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 20px; background: #0066cc; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; cursor: pointer; width: 100%; }
    button:hover { background: #0052a3; }
    .msg { margin-top: 14px; font-size: 13px; text-align: center; padding: 10px; border-radius: 4px; }
    .success { color: green; background: #e8f5e9; }
    .error { color: red; background: #ffebee; }
  </style>
</head>
<body>
<div class="card">
  <h2>Employee Referral Form</h2>

  <label>Candidate Name *</label>
  <input type="text" id="candidate_name" placeholder="Full name of candidate" />

  <label>Email *</label>
  <input type="email" id="email" placeholder="candidate@email.com" />

  <label>Phone *</label>
  <input type="text" id="phone" placeholder="10 digit mobile number" />

  <label>Position Referred For *</label>
  <select id="position">
    <option value="">-- Loading positions... --</option>
  </select>

  <label>Your Email (Referrer) *</label>
  <input type="email" id="referrer_email" placeholder="your@email.com" />

  <button onclick="submitReferral()">Submit Referral</button>
  <div class="msg" id="msg" style="display:none;"></div>
</div>

<script>
  window.onload = function() {
    var urlParams = new URLSearchParams(window.location.search);

    // Pre-fill referrer email from URL
    var referrerEmail = urlParams.get('email');
    if (referrerEmail) {
      document.getElementById("referrer_email").value = decodeURIComponent(referrerEmail);
    }

    // Load jobs from URL parameter
    var jobsParam = urlParams.get('jobs');
    var select = document.getElementById("position");

    if (jobsParam) {
      select.innerHTML = '<option value="">-- Select Position --</option>';
      var decoded = decodeURIComponent(jobsParam);
      decoded = decoded.replace(/^\[/, '').replace(/\]$/, '');
      var jobs = decoded.split(',');
      jobs.forEach(function(job) {
        job = job.trim();
        var parts = job.split('|');
        if (parts.length === 2) {
          var opt = document.createElement("option");
          opt.value = parts[1].trim();
          opt.text = parts[0].trim();
          select.appendChild(opt);
        }
      });
    } else {
      select.innerHTML = '<option value="">-- No positions available --</option>';
    }
  };

  function submitReferral() {
    var name = document.getElementById("candidate_name").value.trim();
    var email = document.getElementById("email").value.trim();
    var phone = document.getElementById("phone").value.trim();
    var positionSelect = document.getElementById("position");
    var positionName = positionSelect.options[positionSelect.selectedIndex].text;
    var positionId = positionSelect.value;
    var referrerEmail = document.getElementById("referrer_email").value.trim();
    var msg = document.getElementById("msg");

    if (!name || !email || !phone || !positionId || !referrerEmail) {
      msg.style.display = "block";
      msg.className = "msg error";
      msg.innerText = "Please fill all fields.";
      return;
    }

    msg.style.display = "block";
    msg.className = "msg";
    msg.innerText = "Submitting...";

    var params = new URLSearchParams();
    params.append("methodname", "referralToRecruit");
    params.append("First_Name", name);
    params.append("Email", email);
    params.append("Phone_Number", phone);
    params.append("Position_referred_for", positionName);
    params.append("AddedBy", referrerEmail);
    params.append("ReferrerEmail", referrerEmail);

    fetch("https://people.zoho.in/api/v2/forms/P_StandAloneFunction", {
      method: "POST",
      credentials: "include",
      body: params
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      msg.className = "msg success";
      msg.innerText = "Referral submitted successfully! The candidate will be contacted shortly.";
      document.getElementById("candidate_name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("referrer_email").value = "";
      document.getElementById("position").selectedIndex = 0;
    })
    .catch(function() {
      msg.className = "msg error";
      msg.innerText = "Something went wrong. Please try again.";
    });
  }
</script>
</body>
</html>
